<!DOCTYPE html>
<html>

<head>
    <style>
        #favicon {
            width: 64px;
            height: 64px;
            background-color: #4f46e5;
            /* primary color */
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
        }

        #inner {
            width: 40px;
            height: 40px;
            background-color: white;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="favicon">
        <div id="inner"></div>
    </div>
</body>

</html>
